<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>605streams - watch movies & tv shows</title>
    
    <!-- Modern Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body class="home-page">
    <div class="home-container">
        <!-- Hero Branding Section -->
        <header class="hero">
            <div class="hero-glow"></div>
            <h1 class="hero-title">605<span>streams</span></h1>
            <p class="hero-subtitle">Stream any movie or TV show. Instantly. No ads.</p>
            
            <!-- Search First Interface -->
            <div class="search-container">
                <div class="search-type-toggle">
                    <button class="type-btn active" id="toggle-movie" data-type="movie">Movies</button>
                    <button class="type-btn" id="toggle-tv" data-type="tv">TV Shows</button>
                </div>
                <div class="search-input-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="home-search" placeholder="Search for a movie..." autocomplete="off">
                    <button id="home-search-btn" class="search-btn">Search</button>
                </div>
                <div id="search-dropdown" class="search-dropdown hidden"></div>
            </div>
        </header>

        <!-- Recently Viewed / Continue Watching Section -->
        <section class="recent-section" id="recent-section" style="display: none;">
            <div class="section-header">
                <h2>⏱️ Continue Watching</h2>
            </div>
            <div id="recent-grid" class="content-grid"></div>
        </section>

        <!-- Trending Section -->
        <section class="trending-section">
            <div class="section-header">
                <h2>🔥 Trending Now</h2>
            </div>
            <div id="trending-grid" class="content-grid">
                <div class="loading-spinner">Loading trending content...</div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="home-footer">
            <p>605streams • Personal streaming client</p>
            <button id="advanced-mode-link" class="footer-link">Advanced Mode (Manual ID)</button>
        </footer>
    </div>

    <!-- Adblock Warning Modal -->
    <div id="adblock-modal" class="adblock-modal hidden">
        <div class="adblock-modal-overlay"></div>
        <div class="adblock-modal-content">
            <div class="adblock-icon-wrapper">
                <svg class="adblock-warning-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </div>
            <h2 class="adblock-title">Important Notice</h2>
            <p class="adblock-text">Use an <strong>adblocker</strong> OR <strong>Brave browser</strong> (Recommended) for a clean, secure, and ad-free streaming experience.</p>
            <button id="adblock-dismiss-btn" class="adblock-dismiss-btn">Okay</button>
        </div>
    </div>

    <script src="home.js" type="module"></script>
</body>
</html>
